name: Release

# Triggers on any pushed tag matching v* (e.g. v0.1.0, v1.2.3).
# Produces a signed x64+ARM64 .msixbundle and attaches it (plus the
# public .cer end users need) to a GitHub Release.
on:
  push:
    tags:
      - 'v*'

# softprops/action-gh-release creates the release on our behalf.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      # Tag v0.1.0 → MSIX Identity Version 0.1.0.0. MSIX requires a 4-part
      # version; we pad with .0 so single-digit pre-release tags work too.
      - name: Derive version from tag
        id: version
        shell: pwsh
        run: |
          $raw = "${{ github.ref_name }}".TrimStart('v')
          $parts = $raw -split '\.'
          while ($parts.Count -lt 4) { $parts += '0' }
          $version = ($parts[0..3] -join '.')
          Write-Output "VERSION=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Building version $version (from tag ${{ github.ref_name }})"

      - name: Stamp version into Package.appxmanifest
        shell: pwsh
        run: |
          $path = 'MarkdownStudio/Package.appxmanifest'
          $xml = [xml](Get-Content $path)
          $xml.Package.Identity.Version = '${{ steps.version.outputs.VERSION }}'
          $xml.Save((Resolve-Path $path))

      # Decode the PFX (stored in the SIGNING_CERT_BASE64 secret) onto the
      # runner's filesystem so MSBuild's signing step can use it.
      - name: Restore signing certificate
        shell: pwsh
        run: |
          $pfxBytes = [Convert]::FromBase64String("${{ secrets.SIGNING_CERT_BASE64 }}")
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\signing.pfx", $pfxBytes)

      - name: Restore packages
        run: dotnet restore MarkdownStudio/MarkdownStudio.csproj

      # AppxBundle=Always + AppxBundlePlatforms="x64|ARM64" tells MSBuild to
      # build both architectures and merge into a single .msixbundle.
      # UapAppxPackageBuildMode=SideloadOnly emits a sideload package (not
      # the .appxupload Store format). The build also writes a .cer next to
      # the bundle which we attach to the Release.
      - name: Build & sign MSIX bundle
        shell: pwsh
        run: |
          msbuild MarkdownStudio/MarkdownStudio.csproj `
            /restore `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:AppxBundle=Always `
            /p:AppxBundlePlatforms="x64|ARM64" `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /p:GenerateAppInstallerFile=False `
            /p:AppxPackageSigningEnabled=true `
            /p:PackageCertificateKeyFile="$env:RUNNER_TEMP\signing.pfx" `
            /p:PackageCertificatePassword="${{ secrets.SIGNING_CERT_PASSWORD }}" `
            /p:AppxPackageDir="$env:GITHUB_WORKSPACE\appxout\\"

      # MSBuild writes the bundle into a versioned subfolder under appxout/.
      # Locate it dynamically and stage the user-facing artifacts (the
      # .msixbundle plus the .cer they need to install once).
      - name: Stage release artifacts
        id: stage
        shell: pwsh
        run: |
          $bundle = Get-ChildItem -Path appxout -Filter '*.msixbundle' -Recurse | Select-Object -First 1
          $cer    = Get-ChildItem -Path appxout -Filter '*.cer'        -Recurse | Select-Object -First 1
          if (-not $bundle) { throw "No .msixbundle found under appxout/" }
          if (-not $cer)    { throw "No .cer found under appxout/" }
          New-Item -ItemType Directory -Path release -Force | Out-Null
          $bundleName = "MarkdownStudio-${{ steps.version.outputs.VERSION }}-x64-arm64.msixbundle"
          $cerName    = "MarkdownStudio-${{ steps.version.outputs.VERSION }}.cer"
          Copy-Item $bundle.FullName "release/$bundleName"
          Copy-Item $cer.FullName    "release/$cerName"
          Write-Output "BUNDLE=release/$bundleName" >> $env:GITHUB_OUTPUT
          Write-Output "CER=release/$cerName"       >> $env:GITHUB_OUTPUT
          Write-Host  "Staged: $bundleName, $cerName"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Markdown Studio ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.stage.outputs.BUNDLE }}
            ${{ steps.stage.outputs.CER }}
          body: |
            ## Install

            Markdown Studio is signed with a self-signed certificate. Windows
            needs to trust it once before the installer will run.

            1. Download **`MarkdownStudio-${{ steps.version.outputs.VERSION }}.cer`** below.
            2. Right-click → **Install Certificate** → **Local Machine** →
               **Place all certificates in the following store** →
               **Trusted Root Certification Authorities** → Finish.
            3. Download **`MarkdownStudio-${{ steps.version.outputs.VERSION }}-x64-arm64.msixbundle`** below.
            4. Double-click to install.

            (Only needed on first install. Future versions install directly.)
